<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Support Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>

<main class="container my-4">
  <div class="card auth-card p-4">
    <h3 class="mb-3 text-center">Create Account</h3>
    <form id="registerForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" minlength="6" required>
        <div class="form-text">At least 6 characters.</div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">Register</button>
    </form>
    <p class="text-center mt-3 mb-0">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script>
renderNavbar("register");

document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const submitBtn = document.getElementById("submitBtn");

  if (password !== confirmPassword) {
    showToast("Passwords do not match.", "danger");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Creating account…";
  try {
    await apiFetch("/register", { method: "POST", body: { name, email, password } });
    showToast("Account created! Please log in.", "success");
    setTimeout(() => (window.location.href = "login.html"), 900);
  } catch (err) {
    showToast(err.message, "danger");
    submitBtn.disabled = false;
    submitBtn.textContent = "Register";
  }
});
</script>
</body>
</html>
