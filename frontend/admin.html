<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Support Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>

<main class="container my-4">
  <h3 class="mb-4"><i class="bi bi-speedometer2"></i> Admin Dashboard</h3>

  <ul class="nav nav-tabs mb-4" id="adminTabs">
    <li class="nav-item"><button class="nav-link active" data-tab="overview">Overview</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="tickets">All Tickets</button></li>
    <li class="nav-item"><button class="nav-link" data-tab="users">Manage Users</button></li>
  </ul>

  <!-- Overview tab -->
  <section id="tab-overview">
    <div class="row g-3 mb-4" id="statsRow">
      <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Total Tickets</div></div></div>
      <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Open</div></div></div>
      <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Resolved</div></div></div>
      <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Users</div></div></div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-6"><div class="card p-3"><h6 class="mb-3">Tickets by Status</h6><canvas id="statusChart" height="220"></canvas></div></div>
      <div class="col-md-6"><div class="card p-3"><h6 class="mb-3">Tickets by Priority</h6><canvas id="priorityChart" height="220"></canvas></div></div>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-md-6"><div class="card p-3"><h6 class="mb-3">Tickets per Month</h6><canvas id="monthlyChart" height="220"></canvas></div></div>
      <div class="col-md-6"><div class="card p-3"><h6 class="mb-3">Most Active Users</h6><canvas id="activeUsersChart" height="220"></canvas></div></div>
    </div>
  </section>

  <!-- Tickets tab -->
  <section id="tab-tickets" class="d-none">
    <div class="card p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <label class="form-label small">Search</label>
          <input type="search" class="form-control" id="searchInput" placeholder="Subject, description, customer…">
        </div>
        <div class="col-md-3">
          <label class="form-label small">Status</label>
          <select class="form-select" id="statusFilter">
            <option value="">All</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Priority</label>
          <select class="form-select" id="priorityFilter">
            <option value="">All</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100" id="applyFiltersBtn"><i class="bi bi-funnel"></i> Filter</button>
        </div>
      </div>
    </div>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr><th>#</th><th>Subject</th><th>Customer</th><th>Priority</th><th>Status</th><th>Created</th><th></th></tr>
          </thead>
          <tbody id="ticketsBody">
            <tr><td colspan="7" class="text-center text-muted py-4">Loading tickets…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Users tab -->
  <section id="tab-users" class="d-none">
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Joined</th><th></th></tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" class="text-center text-muted py-4">Loading users…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
