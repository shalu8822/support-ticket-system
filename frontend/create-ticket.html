<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Ticket — Support Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>

<main class="container my-4">
  <div class="card p-4" style="max-width: 640px; margin: 0 auto;">
    <h4 class="mb-3"><i class="bi bi-plus-circle"></i> Create a Support Ticket</h4>
    <form id="ticketForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Subject</label>
        <input type="text" class="form-control" id="subject" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Priority</label>
        <select class="form-select" id="priority">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="description" rows="5" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Attachment (optional)</label>
        <input type="file" class="form-control" id="attachment">
        <div class="form-text">Allowed: images, pdf, docx, txt, log, zip — max 5MB.</div>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">Submit Ticket</button>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script src="js/create-ticket.js"></script>
</body>
</html>
