<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Details — Support Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>

<main class="container my-4">
  <div class="card p-4 mb-3" style="max-width: 760px; margin: 0 auto;">
    <div id="ticketHeader">
      <div class="skeleton" style="height: 32px; width: 60%;"></div>
    </div>

    <div id="ticketBody" class="mt-3"></div>

    <div class="d-flex gap-2 mt-3" id="ticketActions"></div>
  </div>

  <div class="card p-4" style="max-width: 760px; margin: 0 auto;">
    <h5 class="mb-3"><i class="bi bi-chat-dots"></i> Comments</h5>
    <div id="commentsList" class="d-flex flex-column gap-3 mb-3"></div>

    <form id="commentForm">
      <div class="mb-2">
        <textarea class="form-control" id="commentText" rows="2" placeholder="Write a reply…" required></textarea>
      </div>
      <div class="d-flex justify-content-between align-items-center">
        <div class="form-check d-none" id="internalCheckWrap">
          <input class="form-check-input" type="checkbox" id="internalCheck">
          <label class="form-check-label small" for="internalCheck">Internal note (agents only)</label>
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Post Reply</button>
      </div>
    </form>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script src="js/ticket-details.js"></script>
</body>
</html>
