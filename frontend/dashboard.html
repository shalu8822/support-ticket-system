<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — Support Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>

<main class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h3 class="mb-0">Welcome back, <span id="userName">…</span></h3>
      <p class="text-muted mb-0" id="userEmail"></p>
    </div>
    <a href="create-ticket.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New Ticket</a>
  </div>

  <div class="row g-3 mb-4" id="statsRow">
    <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Total Tickets</div></div></div>
    <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Open</div></div></div>
    <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">In Progress</div></div></div>
    <div class="col-6 col-md-3"><div class="card stat-card p-3 text-center"><div class="stat-value skeleton">&nbsp;</div><div class="text-muted">Resolved</div></div></div>
  </div>

  <div class="card p-3">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
      <h5 class="mb-0">My Tickets</h5>
      <div class="d-flex gap-2 flex-wrap">
        <input type="search" class="form-control form-control-sm" id="searchInput" placeholder="Search subject…" style="width: 200px;">
        <select class="form-select form-select-sm" id="statusFilter" style="width: 150px;">
          <option value="">All statuses</option>
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Resolved">Resolved</option>
        </select>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr><th>#</th><th>Subject</th><th>Priority</th><th>Status</th><th>Created</th><th></th></tr>
        </thead>
        <tbody id="ticketsBody">
          <tr><td colspan="6" class="text-center text-muted py-4">Loading tickets…</td></tr>
        </tbody>
      </table>
    </div>
    <p class="text-muted mb-0 d-none" id="emptyState">You haven't submitted any tickets yet. <a href="create-ticket.html">Create your first ticket</a>.</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
