<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Support Ticket System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar"></div>

<main class="container my-4">
  <div class="card auth-card p-4">
    <h3 class="mb-3 text-center"><i class="bi bi-person-circle"></i> Log In</h3>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">Log In</button>
    </form>
    <p class="text-center mt-3 mb-0">New here? <a href="register.html">Create an account</a></p>
    <p class="text-center small text-muted mt-2 mb-0">
      Support agent (admin) demo login: <code>admin@stv.local</code> / <code>Admin@123</code>
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/navbar.js"></script>
<script>
renderNavbar("login");

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const submitBtn = document.getElementById("submitBtn");

  submitBtn.disabled = true;
  submitBtn.textContent = "Logging in…";
  try {
    const data = await loginRequest(email, password);
    Auth.setSession(data.access_token, data.role);
    showToast("Welcome back!", "success");
    setTimeout(() => {
      window.location.href = data.role === "admin" ? "admin.html" : "dashboard.html";
    }, 500);
  } catch (err) {
    showToast(err.message, "danger");
    submitBtn.disabled = false;
    submitBtn.textContent = "Log In";
  }
});
</script>
</body>
</html>
